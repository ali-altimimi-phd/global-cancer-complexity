project:
  type: book
  output-dir: ../docs

book: 
  title: "Chaos and Complexity in Cancer"
  author: Ali Al-Timimi, PhD

  chapters:
    - index.qmd

    - part: "Theory"
      chapters:
        - theory/overview.qmd
        - theory/cell.qmd
        - theory/cancer_cas.qmd
        - theory/theory_summary.qmd

    - part: "Data"
      chapters:
        - methods/dataset_description.qmd

    - part: "Workflows"
      chapters:
        - methods/pipeline_overview.qmd
        - methods/preprocessing_pipeline_overview.qmd
        - methods/analysis_pipeline_overview.qmd
        - methods/reporting_pipeline_overview.qmd

    - part: "Feature Space Construction and Statistical Calibration"
      chapters:
        - methods/filtering.qmd
        - methods/resampling_and_parameter_calibration.qmd

    - part: "Quantitative Framework"
      chapters:
        - framework/complexity_and_entropy_measures.qmd
        - framework/latent_space.qmd
        - framework/biological_complexity_dimensions.qmd

    - part: "Structure of Filtered Probe Sets"
      chapters:
        - results/filtered_feature_space_structure.qmd
        - results/filtered_feature_space_structure_top_n.qmd

    - part: "Results: Carcinomas"
      chapters:
        - reports/generated_reports/comparison_report_blad_tcc.qmd
        - reports/generated_reports/comparison_report_br_brad.qmd
        - reports/generated_reports/comparison_report_col_coadread.qmd
        - reports/generated_reports/comparison_report_kid_rcc.qmd
        - reports/generated_reports/comparison_report_lu_luad.qmd
        - reports/generated_reports/comparison_report_ov_ovad.qmd
        - reports/generated_reports/comparison_report_pa_paad.qmd
        - reports/generated_reports/comparison_report_ut_eac.qmd

    - part: "Results: Blastomas"
      chapters:
        - reports/generated_reports/comparison_report_brain_gbm.qmd
        - reports/generated_reports/comparison_report_brain_mb.qmd

    - part: "Results: Lymphomas"
      chapters:
        - reports/generated_reports/comparison_report_gc_fl.qmd
        - reports/generated_reports/comparison_report_gc_lbcl.qmd

    - part: "Results: Leukemias"
      chapters:
        - reports/generated_reports/comparison_report_pb_b_all.qmd
        - reports/generated_reports/comparison_report_pb_t_all.qmd

execute:
  freeze: auto

resources:
  - output/global_cancer/plots/**
  - output/global_cancer/tables/**

format:
  html:
    toc: true
    number-sections: true
    theme: cosmo
    html-math-method: mathjax

  pdf:
    documentclass: scrreprt

    toc: true
    number-sections: true

    pdf-engine: xelatex

    keep-tex: true
    latex-auto-install: true

    geometry: margin=0.75in

    fig-width: 6
    fig-height: 4
    dpi: 150

    tbl-colwidths: auto

    include-in-header:
      text: |
        \usepackage{float}
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{caption}
        \captionsetup{font=small}

    classoption:
      - openany
      - oneside